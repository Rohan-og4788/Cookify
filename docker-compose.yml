services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recipe_finder
    volumes:
      - recipe_finder_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d recipe_finder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  recipe_finder_pg:
